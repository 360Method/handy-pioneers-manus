<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Baseline fallback metadata. Per-page SEO is injected at runtime by
         the <SEO /> component (client/src/components/SEO.tsx). React 19
         hoists any <title>/<meta>/<link> from the page component into <head>. -->
    <title>Handy Pioneers — Remodeling & Restoration in Clark County, WA</title>
    <meta name="description" content="Licensed remodeling and restoration contractor serving Vancouver, Camas, Washougal, Ridgefield, Battle Ground and the rest of Clark County, WA." />
    <link rel="canonical" href="https://handypioneers.com/" />
    <meta name="robots" content="index,follow" />
    <meta property="og:site_name" content="Handy Pioneers" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://handypioneers.com/" />
    <meta property="og:image" content="https://d2xsxph8kpxj0f.cloudfront.net/310519663386531688/PMFhFJDf55eBmmtmS9ai7o/og-image_c4d500b1.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Google Fonts: Playfair Display + Source Sans 3 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet" />

    <!-- Elfsight Google Reviews Widget -->
    <script src="https://elfsightcdn.com/platform.js" async></script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
